site_name: noislearn
site_description: Noise filtering and cleaning for tabular classification datasets.
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - search.share
  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - Noise models: guide/noise-models.md
      - TabPFN explainability: guide/tabpfn-explainability.md
  - API Reference:
      - Overview: api/index.md
      - Filters:
          - Distance-based: api/filters/distance-based.md
          - Classifier-based: api/filters/classifier-based.md
          - TabPFN-based: api/filters/tabpfn-based.md
      - Cleaners: api/cleaners.md
